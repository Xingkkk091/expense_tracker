name: expense_tracker
description: 記帳 App - 記錄消費行為與地址
publish_to: 'none'
version: 1.3.2+18
environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  sqflite: ^2.3.3
  path: ^1.9.0
  intl: ^0.20.2
  geolocator: ^13.0.4
  geocoding: ^3.0.0
  fl_chart: ^0.70.2
  uuid: ^4.5.1
  google_fonts: ^8.1.0
  flutter_slidable: ^3.1.1
  package_info_plus: ^8.1.2
  http: ^1.2.2
  dio: ^5.7.0
  open_filex: ^4.5.0
  path_provider: ^2.1.5
  shared_preferences: ^2.3.3
  flutter_map: ^7.0.2
  flutter_map_marker_cluster: ^1.4.0
  latlong2: ^0.9.1
  mobile_scanner: ^5.2.3
  barcode_widget: ^2.0.4
  share_plus: ^10.1.2
  file_picker: ^8.1.4
  csv: ^6.0.0
  wakelock_plus: ^1.2.10
  screen_brightness: ^2.1.2
  local_auth: ^2.3.0
  crypto: ^3.0.6
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  image_picker: ^1.1.2
  home_widget: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.2

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#4F6AF5"
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icon/
